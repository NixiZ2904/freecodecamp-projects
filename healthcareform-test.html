<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>
  <body>
  <h1 id="title">Health care</h1>
    <p id="description">Thanks for taking the time to help us and our community!</p>
    <form id="survey-form">
      <input id="name" type="text" placeholder="e.g., John Doe" required>
      <input id="email" type="email" placeholder="example@email.com" required>
      <input id="number" type="number" placeholder="18"
      min=5
      max=100>
      <label id="name-label">Type your name</label>
      <label id="email-label">Type your email</label>
      <label id="number-label">Type your age</label>
        <select id="dropdown">
          <option>Sedentary  </option>
          <option selected>Active </option>
          <option>Athlete</option>
        <input type="radio" value="active" name="activity">Active
        <input type="radio" value="sedentary" name="activity">Sedentary
    </select>
         <label>
        <input type="checkbox" value="diet"> Diet
      </label>
      <label>
        <input type="checkbox" value="exercise"> Exercise
      </label>

      <label>Comments:
        <textarea placeholder="Write your comments here..."></textarea>
      </label>


      <input id="submit" type="submit" value="Submit">
    </form>

  </body>
</html>
