<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <ul class="todo-list">

        <li>
            <input type="checkbox" id="keyboard">
            <label for="keyboard">Buy a new Keyboard</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" target="_blank" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-stylized-to-do-list/build-a-stylized-to-do-list#">Amazon</a></li>
            </ul>
        </li>

        <li>
            <input type="checkbox" id="mouse">
            <label for="mouse">Buy a new Mouse</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" target="_blank" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-stylized-to-do-list/build-a-stylized-to-do-list#">Amazon</a></li>
            </ul>
        </li>

        <li>
            <input type="checkbox" id="study">
            <label for="study">Study at least 30 min</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" target="_blank" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-stylized-to-do-list/build-a-stylized-to-do-list#">freeCodeCamp</a></li>
            </ul>
        </li>

        <li>
            <input type="checkbox" id="train">
            <label for="train">Train</label>
            <ul class="sub-item">
                <li><a class="sub-item-link" target="_blank" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-stylized-to-do-list/build-a-stylized-to-do-list#">YouTube</a></li>
            </ul>
        </li>

    </ul>
</body>

</html>
